name: Weekly Star Refresh

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  refresh-stars:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (for gh-stars)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/gh-stars
            ~/.cargo/registry
            ~/.cargo/git
          key: gh-stars-${{ runner.os }}-v0.1.11

      - name: Install gh-stars
        run: |
          if ! command -v gh-stars &> /dev/null; then
            git clone https://github.com/prabirshrestha/gh-stars /tmp/gh-stars-build
            cd /tmp/gh-stars-build
            cargo install --path . --root ~/.cargo
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi

      - name: Restore stars database cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/gh-stars
          key: stars-db-${{ runner.os }}
          restore-keys: |
            stars-db-${{ runner.os }}

      - name: Fetch latest stars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.cache/gh-stars
          gh-stars fetch pvnkmnk
        timeout-minutes: 10

      - name: Run regeneration script
        run: |
          python3 scripts/update_stars.py --no-fetch --auto-curate

      - name: Check for changes
        id: git-check
        run: |
          git add stars/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected, will create PR."
          fi

      - name: Create PR with refreshed stars
        if: steps.git-check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: 'weekly: refresh stars & regenerate guides'
          title: 'Weekly Star Refresh'
          body: |
            Automated weekly refresh of GitHub stars.

            **What changed:**
            - Fetched latest stars for pvnkmnk via gh-stars
            - New repos scoring ≥8 with clear category match auto-curated into STAR-GUIDE
            - Remaining uncategorized repos appended to NOT-CURATED.md
            - AGENT-GUIDE.md regenerated from STAR-GUIDE.md + DB metadata
            - CHEATSHEET.md regenerated
            - CSV/TXT exports updated
          branch: weekly-star-refresh
          delete-branch: true
          base: ${{ github.ref_name }}
          labels: |
            automated
            stars

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Workflow failed! Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

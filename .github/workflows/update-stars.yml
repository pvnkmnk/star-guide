name: Weekly Star Refresh

on:
  schedule:
    # Every Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages
  cancel-in-progress: false

jobs:
  refresh-stars:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (for gh-stars)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/gh-stars
            ~/.cargo/registry
            ~/.cargo/git
          key: gh-stars-${{ runner.os }}-v0.1.11

      - name: Install gh-stars
        run: |
          if ! command -v gh-stars &> /dev/null; then
            git clone https://github.com/prabirshrestha/gh-stars /tmp/gh-stars-build
            cd /tmp/gh-stars-build
            cargo install --path . --root ~/.cargo
            echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          fi

      - name: Restore stars database cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/gh-stars
          key: stars-db-${{ runner.os }}
          restore-keys: |
            stars-db-${{ runner.os }}

      - name: Fetch latest stars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p ~/.cache/gh-stars
          gh-stars fetch pvnkmnk
        timeout-minutes: 10

      - name: Run regeneration script
        run: |
          python3 scripts/update_stars.py --no-fetch --auto-curate

      - name: Check for changes
        id: git-check
        run: |
          git add stars/
          if git diff --cached --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes detected."
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected, will push to main."
          fi

      - name: Commit and push refreshed stars
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "weekly: refresh stars & regenerate guides"
          git push origin HEAD:main

      - name: Trigger deploy
        if: steps.git-check.outputs.changed == 'true'
        run: |
          echo "::notice::Pushed to main — deploy workflow should auto-trigger at ${{ github.server_url }}/${{ github.repository }}/actions/workflows/deploy-gh-pages.yml"

      - name: Notify failure
        if: failure()
        run: |
          echo "::error::Workflow failed! Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

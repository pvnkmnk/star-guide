<style>
:root {
  --ink: #070A0B;
  --surface: #0C0E10;
  --card: #111316;
  --border: rgba(255,255,255,0.08);
  --border-hover: rgba(255,255,255,0.14);
  --accent: #FF6363;
  --accent-subtle: rgba(255,99,99,0.12);
  --text-primary: #EDEEF0;
  --text-secondary: #9CA0A8;
  --text-muted: #565A60;
  --radius: 8px;
  --radius-lg: 12px;
}

[data-theme="light"] {
  --ink: #F5F5F7;
  --surface: #FFFFFF;
  --card: #FAFAFA;
  --border: rgba(0,0,0,0.08);
  --border-hover: rgba(0,0,0,0.16);
  --text-primary: #1A1A2E;
  --text-secondary: #5A5D6E;
  --text-muted: #8E919E;
  --accent: #E54D4D;
  --accent-subtle: rgba(229,77,77,0.08);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;font-size:16px}
body{
  background:var(--ink);
  color:var(--text-secondary);
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  line-height:1.5;
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
}

h1,h2,h3{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;text-wrap:balance;letter-spacing:-0.02em}
h1{font-size:clamp(1.75rem,4vw,3rem);font-weight:700;color:var(--text-primary);line-height:1.15}
h2{font-size:clamp(1.1rem,2.5vw,1.5rem);font-weight:600;color:var(--text-primary)}
h3{font-size:0.875rem;font-weight:600;color:var(--text-primary);letter-spacing:0}

/* ─── Theme Toggle ─── */
.theme-toggle{
  position:absolute;top:1rem;right:1.5rem;
  background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:0.4rem 0.75rem;color:var(--text-secondary);
  font-family:inherit;font-size:0.75rem;font-weight:500;
  cursor:pointer;transition:all 0.15s;z-index:2;
  display:flex;align-items:center;gap:0.35rem;
}
.theme-toggle:hover{border-color:var(--border-hover);color:var(--text-primary)}
[data-theme="dark"] .theme-toggle .light-icon{display:none}
[data-theme="light"] .theme-toggle .dark-icon{display:none}

/* ─── Layout ─── */
.container{max-width:1200px;margin:0 auto;padding:0 1.5rem}
header{
  padding:3.5rem 1.5rem 2rem;text-align:center;
  border-bottom:1px solid var(--border);
}
header .subtitle{color:var(--accent);font-size:0.9rem;font-weight:500;margin-top:0.5rem}
header .stats{display:flex;justify-content:center;gap:1rem;flex-wrap:wrap;margin-top:1.25rem;font-size:0.8rem}
header .stats span{
  background:var(--card);border:1px solid var(--border);
  padding:0.35rem 0.85rem;border-radius:6px;color:var(--text-secondary);
}

/* ─── Hero Top Repos ─── */
.hero-repos{padding:2rem 1.5rem 1rem}
.hero-repos h3{text-align:center;color:var(--text-muted);margin-bottom:0.75rem;font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:0.08em}
.hero-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:0.5rem;max-width:1200px;margin:0 auto}
.hero-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:0.85rem 1rem;cursor:pointer;transition:all 0.15s;
  text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:0.15rem;
}
.hero-card:hover{border-color:var(--accent);background:var(--surface)}
.hero-card .repo-name{color:var(--text-primary);font-size:0.875rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hero-card .repo-stars{color:var(--accent);font-size:0.75rem;font-weight:500}
.hero-card .repo-cat{font-size:0.7rem;color:var(--text-muted)}

/* ─── Keep 10 Section ─── */
.keep-wrap{padding:1.5rem 1.5rem 0.5rem}
.keep-wrap h3{text-align:center;color:var(--text-muted);margin-bottom:0.2rem;font-size:0.75rem;font-weight:500;text-transform:uppercase;letter-spacing:0.08em}
.keep-wrap .keep-subtitle{text-align:center;color:var(--text-muted);font-size:0.7rem;margin-bottom:0.75rem}
.keep-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:0.5rem;max-width:1200px;margin:0 auto}
.keep-card{
  background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
  padding:0.75rem 0.85rem;transition:all 0.15s;
  text-decoration:none;color:inherit;display:flex;flex-direction:column;gap:0.1rem;position:relative;
}
.keep-card:hover{border-color:var(--accent);background:var(--surface)}
.k-rank{position:absolute;top:4px;right:8px;font-size:0.9rem;font-weight:700;color:var(--text-muted);opacity:0.3}
.k-emoji{font-size:1.15rem}
.k-name{color:var(--text-primary);font-weight:600;font-size:0.83rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.k-cat{font-size:0.65rem;color:var(--accent);font-weight:500;text-transform:uppercase;letter-spacing:0.04em}
.k-why{font-size:0.7rem;color:var(--text-secondary);line-height:1.4;margin-top:0.15rem}

/* ─── Search ─── */
.search-wrap{padding:1.25rem 1.5rem;max-width:680px;margin:0 auto}
.search-input{
  width:100%;background:var(--surface);border:1px solid var(--border);border-radius:8px;
  padding:0.7rem 1rem;color:var(--text-primary);font-family:inherit;font-size:0.875rem;
  transition:all 0.15s;
}
.search-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-subtle)}
.search-input::placeholder{color:var(--text-muted)}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
.search-results{font-size:0.75rem;color:var(--text-muted);margin-top:0.35rem;text-align:center;min-height:1.2em}
.filter-bar{display:flex;gap:0.5rem;align-items:center;justify-content:center;margin-top:0.5rem;flex-wrap:wrap}
.lang-select{
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:0.35rem 0.6rem;color:var(--text-secondary);font-family:inherit;font-size:0.75rem;
  cursor:pointer;transition:all 0.15s;max-width:200px;
}
.lang-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-subtle)}
.lang-select option{background:var(--surface);color:var(--text-secondary)}
.lang-clear{
  background:none;border:1px solid var(--border);border-radius:6px;
  padding:0.35rem 0.55rem;color:var(--accent);font-family:inherit;font-size:0.7rem;
  cursor:pointer;transition:all 0.15s;
}
.lang-clear:hover{border-color:var(--accent)}

/* ─── Sort Controls ─── */
.sort-controls{display:flex;gap:2px;margin-left:0.4rem}
.sort-btn{
  background:none;border:1px solid var(--border);border-radius:4px;
  padding:0.15rem 0.35rem;color:var(--text-muted);font-family:inherit;font-size:0.6rem;
  cursor:pointer;transition:all 0.12s;white-space:nowrap;
}
.sort-btn:hover{border-color:var(--border-hover);color:var(--text-secondary)}
.sort-btn.active{border-color:var(--accent);color:var(--accent)}

/* ─── Navigation Pills ─── */
.nav-pills{display:flex;flex-wrap:wrap;gap:0.4rem;padding:1rem 1.5rem;max-width:1200px;margin:0 auto;justify-content:center}
.nav-pill{
  background:var(--card);border:1px solid var(--border);border-radius:6px;
  padding:0.3rem 0.7rem;font-size:0.75rem;color:var(--text-secondary);
  cursor:pointer;transition:all 0.15s;font-family:inherit;white-space:nowrap;
}
.nav-pill:hover{border-color:var(--border-hover);color:var(--text-primary)}
.nav-pill.active{border-color:var(--accent);color:var(--accent)}
.nav-pill .count{color:var(--text-muted);font-size:0.65rem;margin-left:0.2rem}

/* ─── Category Sections ─── */
main{max-width:1200px;margin:0 auto;padding:0 1.5rem 4rem}
.category{
  margin-bottom:1rem;border:1px solid var(--border);border-radius:var(--radius-lg);
  background:var(--surface);overflow:hidden;transition:border-color 0.15s;
}
.category.expanded{border-color:var(--border-hover)}
.cat-header{
  display:flex;align-items:center;gap:0.5rem;padding:0.75rem 1rem;
  cursor:pointer;user-select:none;transition:background 0.12s;
}
.cat-header:hover{background:rgba(255,255,255,0.02)}
[data-theme="light"] .cat-header:hover{background:rgba(0,0,0,0.02)}
.cat-header .emoji{font-size:1.25rem}
.cat-header .name{font-weight:600;font-size:0.875rem;color:var(--text-primary);letter-spacing:-0.01em}
.cat-header .count{margin-left:auto;font-size:0.72rem;color:var(--text-muted);background:var(--card);padding:0.15rem 0.5rem;border-radius:5px}
.cat-header .arrow{font-size:0.65rem;color:var(--text-muted);transition:transform 0.2s}
.category.expanded .cat-header .arrow{transform:rotate(180deg)}
.cat-body{display:none;overflow-x:auto}
.category.expanded .cat-body{display:block}

/* ─── Tool Table ─── */
.tool-table{width:100%;border-collapse:collapse;font-size:0.8rem}
.tool-table thead{position:sticky;top:0;z-index:2}
.tool-table th{
  background:var(--card);padding:0.5rem 0.65rem;text-align:left;
  font-size:0.65rem;font-weight:500;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.04em;
  border-bottom:1px solid var(--border);
}
.tool-table td{padding:0.4rem 0.65rem;border-bottom:1px solid var(--border);vertical-align:middle}
.tool-table tr:hover td{background:rgba(255,255,255,0.015)}
[data-theme="light"] .tool-table tr:hover td{background:rgba(0,0,0,0.015)}
.tool-table .repo{color:var(--text-primary);text-decoration:none;font-weight:600;transition:color 0.12s}
.tool-table .repo:hover{color:var(--accent)}
.tool-table .stars{color:var(--accent);text-align:right;white-space:nowrap;font-size:0.75rem;font-weight:500}
.tool-table .lang{color:var(--text-muted);font-size:0.7rem;text-align:center;white-space:nowrap}
.tool-table .desc{color:var(--text-secondary);font-size:0.75rem;max-width:400px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tool-table .desc:hover{white-space:normal;overflow:visible}

/* ─── Toolbox Panel ─── */
.toolbox-toggle{
  background:none;border:1px solid var(--border);border-radius:6px;
  padding:0.15rem 0.4rem;color:var(--text-muted);font-size:0.65rem;
  cursor:pointer;transition:all 0.12s;font-family:inherit;margin-left:0.3rem;
}
.toolbox-toggle:hover{border-color:var(--accent);color:var(--accent)}
.toolbox-toggle.active{border-color:var(--accent);color:var(--accent)}
.toolbox-panel{display:none;padding:0 0.75rem 0.75rem}
.toolbox-panel.show{display:block}
.toolbox-entry{
  display:flex;gap:0.5rem;align-items:flex-start;padding:0.4rem 0;
  border-bottom:1px solid var(--border);border-left:2px solid var(--accent);padding-left:0.6rem;
  margin-bottom:0.1rem;
}
.toolbox-entry:last-child{border-bottom:none}
.t-rank{font-weight:600;font-size:0.7rem;color:var(--accent);min-width:1.2em;text-align:right}
.t-repo{font-weight:600;color:var(--text-primary);text-decoration:none;font-size:0.75rem;transition:color 0.12s;white-space:nowrap}
.t-repo:hover{color:var(--accent)}
.t-why{font-size:0.68rem;color:var(--text-secondary);line-height:1.4;flex:1}
.toolbox-fallback{font-size:0.68rem;color:var(--text-muted);padding:0.4rem 0;font-style:italic}

/* ─── Footer ─── */
footer{
  text-align:center;padding:2rem 1.5rem 3rem;
  border-top:1px solid var(--border);font-size:0.72rem;color:var(--text-muted);
}
footer a{color:var(--text-secondary);text-decoration:none;transition:color 0.12s}
footer a:hover{color:var(--text-primary)}

/* ─── Loading ─── */
.loading{
  text-align:center;padding:3rem 1rem;color:var(--text-muted);
  font-size:0.85rem;font-weight:500;
}
.loading .bar{
  display:inline-block;width:160px;height:2px;background:var(--border);
  margin-top:0.75rem;position:relative;overflow:hidden;border-radius:2px;
}
.loading .bar::after{
  content:'';position:absolute;inset:0;background:var(--accent);
  animation:load 1.5s ease-in-out infinite;width:30%;border-radius:2px;
}
@keyframes load{0%{transform:translateX(-100%)}100%{transform:translateX(400%)}}

/* ─── Responsive ─── */
@media(max-width:768px){
  h1{font-size:1.5rem}
  header{padding:2.5rem 1rem 1.5rem}
  .hero-grid{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
  .tool-table{font-size:0.7rem}
  .tool-table th,.tool-table td{padding:0.3rem 0.35rem}
  .tool-table .desc{max-width:180px}
  .nav-pill{padding:0.25rem 0.55rem;font-size:0.7rem}
  .cat-header{padding:0.6rem 0.75rem}
}
@media(max-width:480px){
  .container{padding:0 0.75rem}
  .hero-grid{grid-template-columns:1fr 1fr}
  .tool-table .desc{max-width:120px}
  .cat-header .name{font-size:0.78rem}
  .k-rank{display:none}
}

@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:0.01ms !important;animation-iteration-count:1 !important;transition-duration:0.01ms !important}
}
</style>
</head>

let categories = {};

function fmtStars(n){
  if(n>=1000000) return (n/1000000).toFixed(1)+'M';
  if(n>=1000) return (n/1000).toFixed(1)+'k';
  return String(n);
}

async function loadData(){
  try{
    const resp = await fetch('stars/AGENT-GUIDE.md');
    if(!resp.ok) throw new Error('HTTP '+resp.status);
    const text = await resp.text();
    parseAGENT(text);
  }catch(e){
    document.getElementById('hero').innerHTML = '';
    document.getElementById('main-content').innerHTML =
      '<div class="loading" style="color:var(--neon-magenta)">SIGNAL LOST — '+e.message+'</div>';
  }
}

function parseAGENT(text){
  const lines = text.split('\n');
  categories = {};
  allTools = [];

  for(const line of lines){
    if(!line || line.startsWith('#')) continue;
    const parts = line.split('|');
    if(parts.length < 5) continue;
    const emoji = parts[0].trim();
    const stars = parseInt(parts[1],10) || 0;
    const fullName = parts[2].trim();
    const lang = parts[3].trim();
    const desc = parts.slice(4).join('|').trim();

    if(!emoji || !fullName) continue;

    const tool = {emoji,stars,fullName,lang,desc,repoName:fullName.split('/')[1]};
    allTools.push(tool);
    if(!categories[emoji]) categories[emoji] = [];
    categories[emoji].push(tool);
  }

  // Sort each category by stars desc
  for(const e of Object.keys(categories)){
    categories[e].sort((a,b)=>b.stars-a.stars);
  }

  // Collect unique languages
  const langSet = new Set();
  for(const t of allTools){
    if(t.lang && t.lang!=='-') langSet.add(t.lang);
  }
  window.allLanguages = [...langSet].sort((a,b)=>a.localeCompare(b));

  renderAll();
}

// Per-category sort state: 'stars' (default) or 'name'
let sortState = {};
let langFilter = '';

function renderAll(){
  renderHero();
  renderNav();
  renderCategories();
  setupLangFilter();
  setupSearch();
}

function renderHero(){
  // Top 8 by stars across all categories
  const top = [...allTools].sort((a,b)=>b.stars-a.stars).slice(0,8);
  const hero = document.getElementById('hero');
  hero.innerHTML = '<h3>⬡ TOP SIGNALS</h3><div class="hero-grid">'+
    top.map(t=>`<a class="hero-card" href="https://github.com/${t.fullName}" target="_blank">
      <span class="repo-name">${t.emoji} ${t.repoName}</span>
      <span class="repo-stars">★ ${fmtStars(t.stars)}</span>
      <span class="repo-cat">${CATEGORY_META[t.emoji]?.name||''}</span>
    </a>`).join('')+
    '</div>';
}

// ─── Keep 10 + Toolbox (shared TOOLBOX.md fetch) ───
let keep = [];
let toolbox = {};

async function fetchToolboxData(){
  try{
    const resp = await fetch('stars/TOOLBOX.md');
    if(!resp.ok) return;
    const text = await resp.text();
    parseKeep(text);
    renderKeep();
    parseToolbox(text);
    // Pre-populate any already-open toolbox panels
    document.querySelectorAll('.toolbox-panel.show').forEach(p=>{
      const emoji = p.dataset.emoji;
      if(emoji&&toolbox[emoji]) renderToolboxPanel(emoji, p);
    });
  }catch(e){/* silently degrade */}
}

function parseKeep(text){
  keep = [];
  // Find the 🏆 table section
  const tableRe = /\|\s*(\d+)\s*\|\s*\[([^\]]+)\]\(([^)]+)\)\s*\|\s*([^|]+)\s*\|\s*([^|]+)\s*\|/g;
  let match;
  while((match = tableRe.exec(text)) !== null){
    keep.push({
      rank: match[1],
      name: match[2],
      url: match[3],
      category: match[4].trim(),
      why: match[5].trim()
    });
  }
}

function renderKeep(){
  if(!keep.length) return;
  // Category name → emoji map (short names from TOOLBOX table)
  const katMap = {
    'Agentic Dev':'🤖','Homelab':'📡','Media':'🎵','Docker':'🐳',
    'AI/LLM':'🧠','Terminal':'⌨️','Databases':'🗄️','Automation':'⚡',
    'Security':'🔒','Dev Resources':'💻'
  };
  const wrap = document.getElementById('keep');
  wrap.innerHTML = 
    '<h3>🏆 IF I COULD ONLY KEEP 10</h3>'+
    '<p class="keep-subtitle">one standout from each major domain</p>'+
    '<div class="keep-grid">'+
    keep.map(k=>`<a class="keep-card" href="${escHtml(k.url)}" target="_blank">
      <span class="k-rank">${k.rank}</span>
      <span class="k-emoji">${katMap[k.category]||'⭐'}</span>
      <span class="k-name">${escHtml(k.name)}</span>
      <span class="k-cat">${escHtml(k.category)}</span>
      <span class="k-why">${escHtml(k.why)}</span>
    </a>`).join('')+
    '</div>';
}
// ─── Toolbox ───
function parseToolbox(text){
  const map = {};
  const sections = text.split(/\n## /);
  const entryRe = /### (\d+)\. \[([^\]]+)\]\(([^)]+)\) ⭐([\d,]+)\n\*\*Why I starred this:\*\* ([\s\S]*?)(?=\n### |\n---|\n## |\n\n## |$)/g;
  
  for(const sec of sections){
    const hm = sec.match(/^([\p{Emoji_Presentation}\p{Emoji}][\u200d\ufe0f]?)\s/u);
    if(!hm) continue;
    const emoji = hm[0].trim();
    const entries = [];
    let m;
    while((m = entryRe.exec(sec)) !== null){
      entries.push({
        rank: m[1],
        name: m[2],
        url: m[3],
        stars: m[4],
        why: m[5].trim()
      });
    }
    if(entries.length > 0) map[emoji] = entries;
  }
  toolbox = map;
}

function renderToolboxPanel(emoji, panel){
  const entries = toolbox[emoji];
  if(entries && entries.length > 0){
    panel.innerHTML = entries.map(e=>`
      <div class="toolbox-entry">
        <span class="t-rank">${e.rank}</span>
        <a class="t-repo" href="${escHtml(e.url)}" target="_blank">${escHtml(e.name)}</a>
        <span class="t-why">${escHtml(e.why)}</span>
      </div>`).join('');
  }else{
    // Fallback: top 10 from category data
    const catTools = categories[emoji];
    if(catTools && catTools.length > 0){
      const top = catTools.slice(0, 10);
      panel.innerHTML = '<div class="toolbox-fallback">auto-generated top 10 (TOOLBOX.md entry coming soon)</div>'+
        top.map((t,i)=>`
          <div class="toolbox-entry">
            <span class="t-rank">${i+1}</span>
            <a class="t-repo" href="https://github.com/${t.fullName}" target="_blank">${escHtml(t.fullName)}</a>
            <span class="t-why">${escHtml(t.desc)}</span>
          </div>`).join('');
    }else{
      panel.innerHTML = '<div class="toolbox-fallback">no data available</div>';
    }
  }
}
// ─── End Toolbox

function renderNav(){
  const nav = document.getElementById('nav-pills');
  nav.innerHTML = EMOJI_ORDER.filter(e=>categories[e]&&categories[e].length>0).map(e=>{
    const c = categories[e];
    const total = c.reduce((s,t)=>s+t.stars,0);
    return `<button class="nav-pill" data-emoji="${e}" title="${CATEGORY_META[e]?.name||''} — ${fmtStars(total)} total ★">
      ${e} ${CATEGORY_META[e]?.name.split(' ')[0]||e} <span class="count">${c.length}</span>
    </button>`;
  }).join('');

  nav.querySelectorAll('.nav-pill').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const emoji = btn.dataset.emoji;
      const el = document.getElementById('cat-'+encodeEmoji(emoji));
      if(el){
        el.scrollIntoView({behavior:'smooth',block:'start'});
        if(!el.classList.contains('expanded')){
          el.querySelector('.cat-header').click();
        }
      }
    });
  });
}

function renderCategories(){
  const main = document.getElementById('main-content');
  main.innerHTML = EMOJI_ORDER.filter(e=>categories[e]&&categories[e].length>0).map(e=>{
    const tools = categories[e];
    const meta = CATEGORY_META[e]||{name:e,desc:''};
    const totalStars = tools.reduce((s,t)=>s+t.stars,0);
    return `<div class="category" id="cat-${encodeEmoji(e)}">
      <div class="cat-header" role="button" tabindex="0" aria-expanded="false" data-emoji="${e}">
        <span class="emoji">${e}</span>
        <span class="name">${meta.name}</span>
        <button class="toolbox-toggle" data-emoji="${e}" aria-label="Show toolbox">🧰</button>
        <span class="count">${tools.length} tools ★ ${fmtStars(totalStars)}</span>
        <span class="sort-controls">
          <button class="sort-btn ${(sortState[e]||'stars')==='stars'?'active':''}" data-emoji="${e}" data-sort="stars" aria-label="Sort by stars">★</button>
          <button class="sort-btn ${sortState[e]==='name'?'active':''}" data-emoji="${e}" data-sort="name" aria-label="Sort by name">A-Z</button>
        </span>
        <span class="arrow">▼</span>
      </div>
      <div class="cat-body">
        <table class="tool-table">
          <thead><tr><th>REPO</th><th>★</th><th>LANG</th><th>DESCRIPTION</th></tr></thead>
          <tbody>
            ${tools.map(t=>`<tr>
              <td><a class="repo" href="https://github.com/${t.fullName}" target="_blank">${t.repoName}</a></td>
              <td class="stars">${fmtStars(t.stars)}</td>
              <td class="lang">${t.lang&&t.lang!=='-'?t.lang:'—'}</td>
              <td class="desc" title="${escHtml(t.desc)}">${escHtml(t.desc)}</td>
            </tr>`).join('')}
          </tbody>
        </table>
        <div class="toolbox-panel" data-emoji="${e}"></div>
      </div>
    </div>`;
  }).join('');

  // Toggle expand (click + keyboard)
  function toggleCat(header){
    const cat = header.closest('.category');
    const expanded = !cat.classList.contains('expanded');
    cat.classList.toggle('expanded');
    header.setAttribute('aria-expanded', String(expanded));
  }
  main.querySelectorAll('.cat-header').forEach(h=>{
    h.addEventListener('click',()=>toggleCat(h));
    h.addEventListener('keydown',e=>{
      if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleCat(h);}
    });
  });

  // Sort button handlers
  main.querySelectorAll('.sort-btn').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const emoji = btn.dataset.emoji;
      const sort = btn.dataset.sort;
      sortState[emoji] = sort;
      // Update active state for this category's buttons
      const cat = btn.closest('.category');
      cat.querySelectorAll('.sort-btn').forEach(b=>b.classList.toggle('active',b.dataset.sort===sort));
      // Re-sort and re-render that category's table
      reRenderCategory(emoji, cat);
    });
  });

  // Expand first category by default
  const first = main.querySelector('.category');
  if(first){
    first.classList.add('expanded');
    const firstHeader = first.querySelector('.cat-header');
    if(firstHeader) firstHeader.setAttribute('aria-expanded','true');
  }

  // Toolbox toggle handlers
  main.querySelectorAll('.toolbox-toggle').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const emoji = btn.dataset.emoji;
      const panel = btn.closest('.category').querySelector('.cat-body .toolbox-panel');
      const isOpen = panel.classList.contains('show');
      if(isOpen){
        panel.classList.remove('show');
        btn.classList.remove('active');
      }else{
        panel.classList.add('show');
        btn.classList.add('active');
        if(panel.innerHTML==='') renderToolboxPanel(emoji, panel);
      }
    });
  });
}

function reRenderCategory(emoji, catEl){
  const tools = [...categories[emoji]];
  const sort = sortState[emoji] || 'stars';
  if(sort==='stars') tools.sort((a,b)=>b.stars-a.stars);
  else tools.sort((a,b)=>a.repoName.toLowerCase().localeCompare(b.repoName.toLowerCase()));
  const tbody = catEl.querySelector('tbody');
  tbody.innerHTML = tools.map(t=>`<tr>
    <td><a class="repo" href="https://github.com/${t.fullName}" target="_blank">${t.repoName}</a></td>
    <td class="stars">${fmtStars(t.stars)}</td>
    <td class="lang">${t.lang&&t.lang!=='-'?t.lang:'—'}</td>
    <td class="desc" title="${escHtml(t.desc)}">${escHtml(t.desc)}</td>
  </tr>`).join('');
  // Re-apply any active filters
  applyFilters();
}

function setupLangFilter(){
  const select = document.getElementById('lang-filter');
  const clearBtn = document.getElementById('lang-clear');
  // Populate options
  select.innerHTML = '<option value="">all languages ('+allLanguages.length+')</option>'+
    window.allLanguages.map(l=>`<option value="${escHtml(l)}">${l}</option>`).join('');

  select.addEventListener('change',()=>{
    langFilter = select.value;
    clearBtn.hidden = !langFilter;
    applyFilters();
    window.updateSearchInfo();
  });
  clearBtn.addEventListener('click',()=>{
    select.value = '';
    langFilter = '';
    clearBtn.hidden = true;
    applyFilters();
    window.updateSearchInfo();
  });
}

function applyFilters(){
  const q = (document.getElementById('search').value||'').toLowerCase().trim();
  let totalVisible = 0;

  document.querySelectorAll('.category').forEach(cat=>{
    const rows = cat.querySelectorAll('tbody tr');
    let catVisible = 0;
    rows.forEach(row=>{
      let show = true;
      if(q){
        const text = row.textContent.toLowerCase();
        if(!text.includes(q)) show = false;
      }
      if(show && langFilter){
        const langCell = row.querySelector('.lang');
        const lang = langCell ? langCell.textContent.trim() : '';
        if(lang !== langFilter) show = false;
      }
      row.style.display = show ? '' : 'none';
      if(show) catVisible++;
    });
    if((q || langFilter) && catVisible===0){
      cat.style.display = 'none';
    }else{
      cat.style.display = '';
      totalVisible += catVisible;
    }
  });

  window._filterVisible = totalVisible;
}

function setupSearch(){
  const input = document.getElementById('search');
  const info = document.getElementById('search-info');
  let visible = 0;

  input.addEventListener('input',()=>{
    const q = input.value.toLowerCase().trim();
    applyFilters();
    updateSearchInfo();

    if(q){
      // Auto-expand matching categories when searching
      document.querySelectorAll('.category').forEach(c=>{
        if(c.style.display!=='none' && !c.classList.contains('expanded')){
          c.classList.add('expanded');
        }
      });
    }else if(!langFilter){
      // Re-collapse all except first when both search and filter cleared
      document.querySelectorAll('.category').forEach((c,i)=>{
        c.classList.toggle('expanded', i===0);
      });
    }
  });

  function updateSearchInfo(){
    const q = input.value.toLowerCase().trim();
    const v = window._filterVisible || 0;
    if(q && langFilter){
      info.textContent = `// ${v} matches for "${input.value}" in ${langFilter}`;
    }else if(q){
      info.textContent = `// found ${v} matches for "${input.value}"`;
    }else if(langFilter){
      info.textContent = `// ${v} repos in ${langFilter}`;
    }else{
      info.textContent = '';
    }
  }
  window.updateSearchInfo = updateSearchInfo;
}

function encodeEmoji(e){
  return [...e].map(c=>c.codePointAt(0).toString(16)).join('-');
}
function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── Boot ───
(function(){
  const saved = localStorage.getItem('theme');
  if(saved === 'light' || (!saved && window.matchMedia('(prefers-color-scheme: light)').matches)){
    document.documentElement.setAttribute('data-theme','light');
  }
})();
loadData();
fetchToolboxData();

// Keyboard shortcut: / to focus search
document.addEventListener('keydown',e=>{
  if(e.key==='/' && document.activeElement!==document.getElementById('search')){
    e.preventDefault();
    document.getElementById('search').focus();
  }
});

// Theme toggle
document.getElementById('theme-toggle').addEventListener('click',()=>{
  const html = document.documentElement;
  const next = html.getAttribute('data-theme')==='dark'?'light':'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
});
</script>

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/star-guide/sw.js',{scope:'/star-guide/'})
    .then(reg => console.log('SW registered:', reg.scope))
    .catch(() => {});
}
</script>
